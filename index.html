<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN-API</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.10);
      width: 100%;
      max-width: 820px;
      padding: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.01em;
    }

    .logo-text span {
      color: #25d366;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 620px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .left-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .right-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }

    .response-area {
      flex: 1;
      min-height: 420px;
      background: #f7f9f7;
      border: 1.5px solid #d6ead8;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #1a472a;
      resize: none;
      outline: none;
      line-height: 1.6;
    }

    .response-area.error {
      color: #c0392b;
      border-color: #f5c6c6;
      background: #fff8f8;
    }

    input[type="text"],
    input[type="password"],
    textarea.msg-input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3dd;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color .18s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea.msg-input:focus {
      border-color: #25d366;
      background: #fff;
    }

    input::placeholder,
    textarea::placeholder {
      color: #aab;
    }

    textarea.msg-input {
      resize: vertical;
      min-height: 70px;
      line-height: 1.5;
    }

    .section-sep {
      height: 1px;
      background: #eef0ee;
      margin: 4px 0;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 7px;
      border: 1.5px solid #cde8cf;
      background: #f4fbf5;
      color: #1a7a3a;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn:hover {
      background: #e5f7e8;
      border-color: #25d366;
    }

    .btn:active {
      background: #d1f0d6;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(25, 120, 58, 0.2);
      border-top-color: #25d366;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
    }

    .btn.loading .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      color: #999;
      height: 18px;
    }

    .sdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ddd;
      flex-shrink: 0;
      transition: background .3s;
    }

    .sdot.ok {
      background: #25d366;
      box-shadow: 0 0 5px #25d366;
    }

    .sdot.err {
      background: #e74c3c;
      box-shadow: 0 0 5px #e74c3c;
    }

    .input-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #999;
      margin-bottom: 3px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.334.101 11.893c0 2.096.549 4.14 1.595 5.945L0 24l6.335-1.652c1.746.943 3.71 1.444 5.71 1.447h.006c6.585 0 11.946-5.336 11.949-11.896 0-3.176-1.24-6.165-3.48-8.45zM12.045 21.785h-.004c-1.774 0-3.514-.474-5.031-1.37l-.361-.214-3.741.975.996-3.612-.235-.372c-.99-1.566-1.512-3.378-1.512-5.237C2.16 6.45 6.625 2 12.048 2c2.627 0 5.093 1.017 6.948 2.863 1.855 1.846 2.876 4.302 2.874 6.911-.003 5.385-4.467 9.811-9.825 9.811zm5.392-7.348c-.296-.147-1.75-.861-2.021-.96-.271-.099-.469-.147-.666.147-.196.295-.762.961-.935 1.158-.173.196-.345.221-.641.074-.296-.147-1.252-.459-2.384-1.464-.881-.783-1.476-1.75-1.648-2.046-.172-.295-.018-.455.13-.601.133-.133.296-.346.444-.52.148-.172.197-.295.296-.492.099-.197.05-.37-.025-.518-.074-.147-.666-1.6-.912-2.19-.24-.576-.485-.498-.666-.507-.172-.008-.37-.01-.567-.01s-.518.074-.789.37c-.272.295-1.035 1.01-1.035 2.463 0 1.453 1.059 2.857 1.207 3.054.147.196 2.084 3.18 5.048 4.46.705.303 1.255.484 1.684.619.707.224 1.352.193 1.86.117.568-.085 1.75-.714 1.997-1.404.247-.69.247-1.28.172-1.404-.074-.123-.271-.197-.568-.345z" />
        </svg>
      </div>
      <div class="logo-text">GREEN<span>-API</span></div>
    </div>

    <div class="main-grid">

      <div class="left-col">

        <div class="field">
          <div class="input-label">idInstance</div>
          <input type="text" id="idInstance" placeholder="1234567890" />
        </div>
        <div class="field">
          <div class="input-label">ApiTokenInstance</div>
          <input type="password" id="apiToken" placeholder="••••••••••••••••••••" />
        </div>

        <div class="section-sep"></div>

        <button class="btn" id="btn-getSettings" onclick="callGetSettings()">
          <div class="spinner"></div>
          <span>getSettings</span>
        </button>

        <button class="btn" id="btn-getStateInstance" onclick="callGetStateInstance()">
          <div class="spinner"></div>
          <span>getStateInstance</span>
        </button>

        <div class="section-sep"></div>

        <div class="field">
          <div class="input-label">Номер получателя</div>
          <input type="text" id="msg-phone" placeholder="77771234567" />
        </div>
        <div class="field">
          <div class="input-label">Сообщение</div>
          <textarea class="msg-input" id="msg-text" placeholder="Hello World!"></textarea>
        </div>
        <button class="btn" id="btn-sendMessage" onclick="callSendMessage()">
          <div class="spinner"></div>
          <span>sendMessage</span>
        </button>

        <div class="section-sep"></div>

        <div class="field">
          <div class="input-label">Номер получателя</div>
          <input type="text" id="file-phone" placeholder="77771234567" />
        </div>
        <div class="field">
          <div class="input-label">URL файла</div>
          <input type="text" id="file-url" placeholder="https://my.site.com/img/horse.png" />
        </div>
        <div class="field">
          <div class="input-label">Имя файла</div>
          <input type="text" id="file-name" placeholder="horse.png" />
        </div>
        <div class="field">
          <div class="input-label">Подпись (необязательно)</div>
          <input type="text" id="file-caption" placeholder="" />
        </div>
        <button class="btn" id="btn-sendFileByUrl" onclick="callSendFileByUrl()">
          <div class="spinner"></div>
          <span>sendFileByUrl</span>
        </button>

      </div>

      <div class="right-col">
        <div class="right-label">Ответ:</div>
        <div class="status-bar">
          <div class="sdot" id="status-dot"></div>
          <span id="status-text">ожидание запроса...</span>
        </div>
        <textarea class="response-area" id="response" readonly
          placeholder='// Ответ метода появится здесь&#10;//&#10;// Введите idInstance и ApiTokenInstance,&#10;// затем нажмите одну из кнопок слева.'></textarea>
      </div>

    </div>

  </div>

  <script>
    function getCreds() {
      const id = document.getElementById('idInstance').value.trim()
      const token = document.getElementById('apiToken').value.trim()

      if (!id || !token) {
        alert('Введите idInstance и ApiTokenInstance!')
        return null
      }

      return { id, token }
    }

    function showResponse(data) {
      const text = JSON.stringify(data, null, 2)
      document.getElementById('response').value = text
    }

    async function callGetSettings() {
      const c = getCreds()
      if (!c) return

      const url = `https://api.green-api.com/waInstance${c.id}/getSettings/${c.token}`

      const response = await fetch(url)
      const data = await response.json()

      showResponse(data)
    }

    async function callGetStateInstance() {
      const c = getCreds()
      if (!c) return

      const url = `https://api.green-api.com/waInstance${c.id}/getStateInstance/${c.token}`

      const response = await fetch(url)
      const data = await response.json()

      showResponse(data)
    }

    async function callSendMessage() {
      const c = getCreds()
      if (!c) return

      const phone = document.getElementById('msg-phone').value.trim()
      const message = document.getElementById('msg-text').value.trim()

      if (!phone || !message) {
        alert('Введите номер и текст сообщения!')
        return
      }

      const url = `https://api.green-api.com/waInstance${c.id}/sendMessage/${c.token}`

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chatId: phone + '@c.us',
          message: message
        })
      })

      const data = await response.json()

      showResponse(data)
    }

    async function callSendFileByUrl() {
      const c = getCreds()
      if (!c) return

      const phone = document.getElementById('file-phone').value.trim()
      const fileUrl = document.getElementById('file-url').value.trim()
      const fileName = document.getElementById('file-name').value.trim()
      const caption = document.getElementById('file-caption').value.trim()

      if (!phone || !fileUrl || !fileName) {
        alert('Введите номер, URL файла и имя файла!')
        return
      }

      const url = `https://api.green-api.com/waInstance${c.id}/sendFileByUrl/${c.token}`

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chatId: phone + '@c.us',
          urlFile: fileUrl,
          fileName: fileName,
          caption: caption
        })
      })

      const data = await response.json()

      showResponse(data)
    }
  </script>
</body>

</html>
